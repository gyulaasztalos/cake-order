name: Build and Push Docker Image

# cake-order is our OWN source: builds are triggered by pushing a semver git tag
# (vX.Y.Z). The tag's version becomes the image tag; Renovate in the ArgoCD repo
# then picks up the new semver and bumps the deployment. (PLANNING.md §4 — kept
# out of this repo.)

permissions:
  contents: read
  packages: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver to build (without leading v), e.g. 1.2.0'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Derive version
        id: version
        env:
          # Interpolated via env, never inline in the script (injection-safe),
          # and validated against a strict semver pattern before use.
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading v from the tag
          fi
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version ${VERSION}"

      - name: Load secrets from 1Password
        id: op-load-secret
        uses: 1password/load-secrets-action@v4
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DOCKERHUB_TOKEN: op://kubernetes/DockerHub read write token for GitHub/credential

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: asztalosgyula
          password: ${{ steps.op-load-secret.outputs.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            asztalosgyula/cake-order:${{ steps.version.outputs.version }}
            asztalosgyula/cake-order:latest
            ghcr.io/gyulaasztalos/cake-order:${{ steps.version.outputs.version }}
            ghcr.io/gyulaasztalos/cake-order:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
